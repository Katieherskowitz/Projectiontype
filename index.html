<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dual Voice Projection</title>
    <link rel="stylesheet" href="./Style.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1 id="mainQuestion" class="main-question">
        Did anything today make me question or reinforce how I see myself? Why did it have that
        effect?
      </h1>

      <section id="controlRail" class="control-rail" aria-label="Recording controls">
        <button
          id="startBtn"
          class="control-dot start-dot"
          aria-label="Start speaking"
          title="Start speaking"
          type="button"
        ></button>
        <button
          id="stopBtn"
          class="control-dot stop-dot"
          aria-label="Stop speaking"
          title="Stop speaking"
          type="button"
          disabled
          hidden
        >
          <svg class="mic-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M12 3a3 3 0 0 0-3 3v6a3 3 0 1 0 6 0V6a3 3 0 0 0-3-3zm-5 8a1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V20H8a1 1 0 1 0 0 2h8a1 1 0 1 0 0-2h-3v-2.08A7 7 0 0 0 19 11a1 1 0 1 0-2 0 5 5 0 1 1-10 0z"
            />
          </svg>
        </button>
        <button id="saveLeftDesignBtn" class="rail-btn" type="button" disabled hidden>
          Save Left Design
        </button>
        <button id="saveRightDesignBtn" class="rail-btn" type="button" disabled hidden>
          Save Right Design
        </button>
        <button id="saveLeftTranscriptBtn" class="rail-btn" type="button" disabled hidden>
          Save Left Transcript
        </button>
        <button id="saveRightTranscriptBtn" class="rail-btn" type="button" disabled hidden>
          Save Right Transcript
        </button>
        <p class="sr-only" aria-live="polite"><span id="statusText">IDLE</span></p>
      </section>

      <section class="flow-columns" aria-label="Two flowing transcript sides">
        <div id="leftOutput" class="flow-text">START SPEAKING TO SEE THE LIVE TRANSCRIPT.</div>
        <div id="rightOutput" class="flow-text">START SPEAKING TO SEE THE SECOND TRANSCRIPT.</div>
      </section>

      <section id="designStage" class="design-stage" hidden>
        <canvas id="projectionCanvas" width="1280" height="720"></canvas>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
