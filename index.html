<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dual Voice Projection</title>
    <link rel="stylesheet" href="./Style.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1 id="mainQuestion" class="main-question">What made you feel something today and why.</h1>

      <section class="control-strip">
        <button id="startBtn" class="btn primary">Start Speaking</button>
        <button id="stopBtn" class="btn danger" disabled>Stop</button>
        <button id="saveDesignBtn" class="btn" disabled>Save as Design</button>
        <button id="saveTranscriptBtn" class="btn" disabled>Save Transcription</button>
        <p class="status-inline" aria-live="polite"><span id="statusText">IDLE</span></p>
      </section>

      <section class="flow-columns" aria-label="Two flowing transcript sides">
        <div id="leftOutput" class="flow-text">START SPEAKING TO SEE THE LIVE TRANSCRIPT.</div>
        <div id="rightOutput" class="flow-text">THE ALTERED TRANSCRIPT APPEARS HERE.</div>
      </section>

      <section id="designStage" class="design-stage" hidden>
        <canvas id="projectionCanvas" width="1280" height="720"></canvas>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
