<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dual Voice Projection</title>
    <link rel="stylesheet" href="./Style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="opening-panel" id="openingPanel">
        <h1>Before You Speak</h1>
        <p>
          Think of one structure in your life that could collapse tonight, then speak as if your
          words are all that remain after the dust settles.
        </p>
      </section>

      <section class="control-strip">
        <button id="startBtn" class="btn primary">Start Speaking</button>
        <button id="stopBtn" class="btn danger" disabled>Stop</button>
        <p class="status-inline"><strong>Status:</strong> <span id="statusText">Idle</span></p>
      </section>

      <section class="side-modes" aria-label="Dual side outputs">
        <div id="positiveOutput" class="text-output left-output">
          PRESS START AND BEGIN SPEAKING.
        </div>
        <div id="negativeOutput" class="text-output right-output">
          YOUR ALTERED OUTPUT APPEARS HERE.
        </div>
      </section>

      <section class="stage-wrap">
        <canvas id="projectionCanvas" width="1280" height="720"></canvas>
      </section>

      <section class="save-panel">
        <button id="saveDesignBtn" class="btn" disabled>Save as Design</button>
        <button id="saveTranscriptBtn" class="btn" disabled>Save Transcription</button>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
