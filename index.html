<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dual Voice Projection</title>
    <link rel="stylesheet" href="./Style.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1 id="mainQuestion" class="main-question">
        Did anything today make me question or reinforce how I see myself? Why did it have that
        effect?
      </h1>

      <section id="controlRail" class="control-rail" aria-label="Recording controls">
        <button
          id="startBtn"
          class="control-dot start-dot"
          aria-label="Start speaking"
          title="Start speaking"
          type="button"
        >
          <svg class="mic-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              d="M12 3a3 3 0 0 0-3 3v6a3 3 0 1 0 6 0V6a3 3 0 0 0-3-3zm-5 8a1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V20H8a1 1 0 1 0 0 2h8a1 1 0 1 0 0-2h-3v-2.08A7 7 0 0 0 19 11a1 1 0 1 0-2 0 5 5 0 1 1-10 0z"
            />
          </svg>
        </button>
        <button
          id="stopBtn"
          class="control-dot stop-dot"
          aria-label="Stop speaking"
          title="Stop speaking"
          type="button"
          disabled
          hidden
        ></button>
        <p class="sr-only" aria-live="polite"><span id="statusText">IDLE</span></p>
      </section>

      <section id="leftSaveRail" class="save-rail left-save-rail" aria-label="Left side save controls">
        <div class="save-item">
          <button id="saveLeftDesignBtn" class="save-dot" type="button" disabled hidden title="Save left design">
            <svg class="save-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6m3-10H5V5h10z" />
            </svg>
          </button>
          <span class="save-label">Design</span>
        </div>
        <div class="save-item">
          <button
            id="saveLeftTranscriptBtn"
            class="save-dot"
            type="button"
            disabled
            hidden
            title="Save left transcript"
          >
            <svg class="save-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6m3-10H5V5h10z" />
            </svg>
          </button>
          <span class="save-label">Transcript</span>
        </div>
      </section>

      <section id="rightSaveRail" class="save-rail right-save-rail" aria-label="Right side save controls">
        <div class="save-item">
          <button
            id="saveRightDesignBtn"
            class="save-dot"
            type="button"
            disabled
            hidden
            title="Save right design"
          >
            <svg class="save-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6m3-10H5V5h10z" />
            </svg>
          </button>
          <span class="save-label">Design</span>
        </div>
        <div class="save-item">
          <button
            id="saveRightTranscriptBtn"
            class="save-dot"
            type="button"
            disabled
            hidden
            title="Save right transcript"
          >
            <svg class="save-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7zm-5 16a3 3 0 1 1 0-6 3 3 0 0 1 0 6m3-10H5V5h10z" />
            </svg>
          </button>
          <span class="save-label">Transcript</span>
        </div>
      </section>

      <section class="flow-columns" aria-label="Two flowing transcript sides">
        <div id="leftOutput" class="flow-text"></div>
        <div id="rightOutput" class="flow-text"></div>
      </section>

      <section id="designStage" class="design-stage" hidden>
        <canvas id="projectionCanvas" width="1280" height="720"></canvas>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
